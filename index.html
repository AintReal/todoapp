<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

  
    <aside class="sidebar">
      <div class="sidebar__header">
        <h1 class="sidebar__title">My Lists</h1>
        <button class="icon-btn" id="newListBtn" title="New list" aria-label="New list">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <nav class="lists" id="lists">

      </nav>

    </aside>


    <main class="main">
      <header class="main__header">
        <div class="main__title-wrap">
          <h2 class="main__title" id="currentListTitle">Select a list</h2>
          <span class="main__count" id="todoCount">0 tasks</span>
        </div>

        <div class="main__actions">
          <form class="input-row" id="todoForm" autocomplete="off">
            <input
              type="text"
              id="todoInput"
              class="todo-input"
              placeholder="Add a task and press Enter…"
              disabled
            />
            <button type="button" class="ghost-btn" id="checkAllBtn" disabled title="Check all">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              Check all
            </button>
            <button type="button" class="ghost-btn danger" id="deleteAllBtn" disabled title="Delete all">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"></path>
              </svg>
              Delete all
            </button>
          </form>
        </div>
      </header>

      <section class="canvas" id="canvas">
        <ul class="todos" id="todos">

        </ul>

        <div class="empty" id="emptyState">
          <div class="empty__icon">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="3"></rect>
              <path d="M8 10h8M8 14h5"></path>
            </svg>
          </div>
          <p class="empty__title">Nothing here yet</p>
          <p class="empty__sub">Create a list on the left, then add tasks above.</p>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <p class="modal__msg" id="modalMsg"></p>
      <div class="modal__btns">
        <button class="ghost-btn" id="modalCancel">Cancel</button>
        <button class="ghost-btn danger" id="modalConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
